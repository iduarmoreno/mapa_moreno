<style>

html, body, #map {
width: 100%;
height: 100%;
padding: 0;
margin: 0;
background-color: #ffffff;
}

/* TITULO */

#titulo-mapa {
position: absolute;
top: 20px;
left: 20px;
right: 180px;   /* deja espacio para el logo */
z-index: 1000;
font-family: Arial, Gadget, sans-serif;
font-size: 32px;
color: #000000;
text-align: center;
text-shadow: 2px 2px 5px rgba(255,255,255,0.8);
pointer-events: none;
}

/* LOGO */

#logo-institucional {
position: absolute;
top: 10px;
right: 10px;
z-index: 1002;
height: 50px;
width: auto;
pointer-events: none;
}

/* FLECHA NORTE */

#flecha-norte{
position:absolute;
top:75px;
right:50px;
width:80px;
height:80px;
z-index:999;
pointer-events:none;
transition:transform 0.2s linear;
}

/* LEYENDA */

.layer-switcher {
margin-top: 90px !important;
padding-top: 0 !important;
}

.layer-switcher ul {
padding-top: 0 !important;
margin-top: 20px !important;
}

.layer-switcher ul::before {
content: "Referencias";
display: block;
font-family: Arial, sans-serif;
font-weight: bold;
font-size: 25px;
color: #333;
text-align: center;
border-bottom: 2px solid #eee;
position: relative;
top: -10px;
padding: 0 5px 10px 5px;
margin-bottom: 0px;
}

/* PIE */

#pie-direccion {
position: absolute;
bottom: 20px;
left: 50%;
transform: translateX(-50%);
z-index: 1000;
font-family: Arial, sans-serif;
font-size: 20px;
color: #888888;
text-align: center;
text-shadow: 1px 1px 2px rgba(255,255,255,0.6);
pointer-events: none;
}

/* CONTROLES */

.ol-control {
background-color: rgba(255,255,255,.4) !important;
padding: 2px !important;
}

/* ============================= */
/* AJUSTES SOLO PARA MOVIL */
/* ============================= */

@media screen and (max-width:768px){

#logo-institucional{
height:15px;
top:5px;
right:5px;
}

#titulo-mapa{
font-size:15px;
top:6px;
width:65%;
left:40%;
transform:translateX(-40%);
line-height:1.2;
}

#pie-direccion{
font-size:11px;
bottom:40px;
width:90%;
}

.layer-switcher{
left:5px !important;
margin-top:55px !important;
font-size:12px;
max-height:60vh;
overflow-y:auto;
}

.ol-control button{
width:34px;
height:34px;
font-size:16px;
}

#flecha-norte{
width:50px;
height:50px;
top:50px;
right:50px;
}

.ol-rotate{
display:none !important;
}


}

</style>

<script>

/* ROTAR FLECHA NORTE */

window.addEventListener("load",function(){

map.getView().on('change:rotation',function(){

var rotation = map.getView().getRotation();
var grados = rotation * (180 / Math.PI);

document.getElementById("flecha-norte").style.transform =
"rotate(" + (-grados) + "deg)";

});

});

/* AJUSTE MOVIL ORIGINAL */

function ajustarMapaMovil(){

if (window.innerWidth <= 768){

var view = map.getView();

view.setZoom(view.getZoom() - 0.7);

var center = view.getCenter();
center[0] = center[0] - 250;
view.setCenter(center);

}

}

window.addEventListener("load", ajustarMapaMovil);


/* OCULTAR FLECHA NORTE CUANDO SE ABRE LA LEYENDA EN MOVIL */

function controlarFlechaMovil(){

if (window.innerWidth <= 768){

var flecha = document.getElementById("flecha-norte");
var boton = document.querySelector(".layer-switcher button");

if(!boton) return;

boton.addEventListener("click", function(){

setTimeout(function(){

var panel = document.querySelector(".layer-switcher");

if(panel.classList.contains("shown")){
flecha.style.display = "none";
}else{
flecha.style.display = "block";
}

},200);

});

}

}

window.addEventListener("load", controlarFlechaMovil);
/* OCULTAR FLECHA NORTE CUANDO SE ABRE LA LEYENDA EN PC (CLIC + HOVER) */

function controlarFlechaPC(){
    if (window.innerWidth > 768){
        var flecha = document.getElementById("flecha-norte");
        var panel = document.querySelector(".layer-switcher");
        var boton = document.querySelector(".layer-switcher button");

        if(!panel || !flecha || !boton) return;

        // 1. Ocultar si pasas el mouse por encima
        panel.addEventListener("mouseenter", function(){
            flecha.style.display = "none";
        });

        // 2. Mostrar al quitar el mouse, PERO solo si el panel no está abierto con clic
        panel.addEventListener("mouseleave", function(){
            if(!panel.classList.contains("shown")){
                flecha.style.display = "block";
            }
        });

        // 3. Manejar el clic explícito (Igual que tu lógica en móvil)
        boton.addEventListener("click", function(){
            setTimeout(function(){
                if(panel.classList.contains("shown")){
                    flecha.style.display = "none";
                }else{
                    flecha.style.display = "block";
                }
            }, 200);
        });
    }
}

window.addEventListener("load", controlarFlechaPC);
   /* ==================================================================== */
/* FORZAR LEYENDA CERRADA, ABRIR SOLO CON CLIC Y OCULTAR FLECHA (PC)    */
/* ==================================================================== */

function configurarLeyendaSoloClic(){
    var panel = document.querySelector(".layer-switcher");
    var boton = document.querySelector(".layer-switcher button");
    var flecha = document.getElementById("flecha-norte"); // Llamamos a la flecha

    if(!panel || !boton || !flecha) return;

    // 1. Obligar a que la leyenda arranque siempre cerrada al cargar la página
    setTimeout(function() {
        panel.classList.remove("shown");
    }, 100);

    // 2. Aplicar la lógica SOLO si es PC (más de 768px)
    if (window.innerWidth > 768){
        
        // Función para frenar en seco que el plugin se abra al pasar el mouse
        var bloquearHoverNativo = function(e){
            e.stopImmediatePropagation();
        };

        // Bloqueamos el "hover" nativo del mapa
        panel.addEventListener("mouseover", bloquearHoverNativo, true);
        panel.addEventListener("mouseout", bloquearHoverNativo, true);
        panel.addEventListener("pointerover", bloquearHoverNativo, true);
        panel.addEventListener("pointerout", bloquearHoverNativo, true);

        // 3. Tomar el control manual del CLIC en el botón
        boton.addEventListener("click", function(e){
            e.stopImmediatePropagation(); // Frenamos errores del plugin
            e.preventDefault();
            
            // Abrimos o cerramos la leyenda
            panel.classList.toggle("shown");

            // Ocultamos o mostramos la flecha al mismo tiempo
            if(panel.classList.contains("shown")){
                flecha.style.display = "none";
            } else {
                flecha.style.display = "block";
            }
        }, true);
    }
}

// Ejecutar cuando termine de cargar el mapa
window.addEventListener("load", configurarLeyendaSoloClic);

</script>
